<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Posts</title>
    <meta name="current-user" th:content="${username}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f1f5f9;
            --surface:   #ffffff;
            --border:    #e2e8f0;
            --border-2:  #cbd5e1;
            --ink:       #0f172a;
            --ink-2:     #475569;
            --ink-3:     #94a3b8;
            --accent:    #6366f1;
            --accent-dk: #4f46e5;
            --accent-lt: #eef2ff;
            --danger:    #ef4444;
            --danger-lt: #fef2f2;
            --success:   #22c55e;
            --success-lt:#f0fdf4;
            --radius:    12px;
            --shadow-sm: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
            --shadow:    0 4px 16px rgba(15,23,42,.08), 0 1px 4px rgba(15,23,42,.04);
            --shadow-lg: 0 12px 32px rgba(15,23,42,.12), 0 2px 8px rgba(15,23,42,.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .header-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 28px;
            height: 66px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-mark {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(99,102,241,.35);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 21px;
            color: var(--ink);
            font-weight: 600;
        }

        .header-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-3);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,.15);
            background: var(--surface);
        }

        .search-input::placeholder { color: var(--ink-3); }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px 5px 5px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 13px;
            color: var(--ink-2);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all .18s;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
            color: #fff;
            box-shadow: 0 2px 8px rgba(99,102,241,.35);
        }
        .btn-primary:hover { box-shadow: 0 4px 14px rgba(99,102,241,.45); filter: brightness(1.06); }

        .btn-ghost {
            background: transparent;
            color: var(--ink-2);
            border: 1.5px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg); border-color: var(--border-2); color: var(--ink); }

        .btn-danger {
            background: var(--danger-lt);
            color: var(--danger);
            border: 1.5px solid #fecaca;
        }
        .btn-danger:hover { background: #fee2e2; border-color: #fca5a5; }

        .btn-success {
            background: var(--success-lt);
            color: #15803d;
            border: 1.5px solid #bbf7d0;
        }
        .btn-success:hover { background: #dcfce7; border-color: #86efac; }

        .btn.loading { opacity: .6; pointer-events: none; }

        /* ── TOOLBAR ── */
        .toolbar {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 28px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--ink);
        }

        .post-count {
            font-size: 13px;
            color: var(--ink-3);
        }

        .toolbar-right { display: flex; align-items: center; gap: 10px; }

        .sort-select {
            padding: 8px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-2);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
        }
        .sort-select:focus { border-color: var(--accent); }

        /* ── MAIN ── */
        .main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 28px 80px;
        }

        /* ── POSTS GRID ── */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* ── POST CARD ── */
        .post-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: box-shadow .2s, transform .2s, border-color .2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .post-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-3px);
            border-color: var(--border-2);
        }

        .post-card-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            flex-shrink: 0;
        }

        .post-card-body {
            padding: 20px 20px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .post-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            color: var(--ink-3);
        }

        .post-avatar {
            width: 22px;
            height: 22px;
            background: var(--accent-lt);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }

        .post-author-name { color: var(--ink-2); font-weight: 500; }
        .meta-dot { width: 3px; height: 3px; background: var(--border-2); border-radius: 50%; }

        .post-card-footer {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .post-reactions {
            display: flex;
            gap: 14px;
        }

        .reaction {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--ink-3);
            font-weight: 500;
        }

        /* Delete button on card — only shown for post owner */
        .card-delete-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            background: var(--danger-lt);
            border: 1.5px solid #fecaca;
            border-radius: 7px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: var(--danger);
            transition: all .18s;
            z-index: 2;
        }

        .post-card:hover .card-delete-btn { display: flex; }
        .card-delete-btn:hover { background: #fee2e2; border-color: #fca5a5; transform: scale(1.1); }
        .card-delete-btn:active { transform: scale(0.95); }

        /* Arrow */
        .post-arrow {
            color: var(--ink-3);
            font-size: 16px;
            transition: transform .2s;
        }
        .post-card:hover .post-arrow { transform: translateX(3px); color: var(--accent); }

        /* ── STATE BOXES ── */
        .state-box {
            grid-column: 1 / -1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 80px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 14px;
        }

        .state-icon { font-size: 44px; }

        .state-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--ink);
        }

        .state-sub { font-size: 14px; color: var(--ink-3); }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .75s linear infinite;
        }

        /* ── TOAST STACK ── */
        .toast-stack {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 1000;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            min-width: 240px;
            max-width: 360px;
            font-size: 13px;
            font-weight: 500;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            animation: slideInRight .25s ease;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 15px;
        }

        .toast.success .toast-icon { background: var(--success-lt); }
        .toast.error   .toast-icon { background: var(--danger-lt); }
        .toast.info    .toast-icon { background: var(--accent-lt); }

        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-3);
            font-size: 18px;
            line-height: 1;
            padding: 0 0 0 6px;
            transition: color .15s;
        }
        .toast-close:hover { color: var(--ink); }

        /* ── MODAL ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn .2s ease;
        }

        .modal-backdrop.hidden { display: none; }

        .modal-box {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: fadeUp .25s ease;
            overflow: hidden;
        }

        .modal-box.modal-sm { max-width: 460px; }
        .modal-box.modal-md { max-width: 580px; }

        .modal-head {
            padding: 22px 24px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-head h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--ink);
        }

        .modal-close-btn {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--ink-2);
            width: 32px;
            height: 32px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .modal-close-btn:hover { background: var(--danger-lt); border-color: #fecaca; color: var(--danger); }

        .modal-body { padding: 24px; }

        .modal-footer {
            padding: 16px 24px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
        }

        .modal-footer .spacer { margin-left: auto; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ink-2);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,.15);
            background: var(--surface);
        }

        .form-error {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--danger-lt);
            border: 1.5px solid #fecaca;
            border-radius: 8px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 18px;
        }

        .form-error.hidden { display: none; }

        /* View post */
        .view-author-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .view-author-avatar {
            width: 36px;
            height: 36px;
            background: var(--accent-lt);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .view-author-name { font-weight: 600; font-size: 15px; color: var(--ink); }
        .view-author-date { font-size: 12px; color: var(--ink-3); }

        .view-title-block {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.35;
            margin: 18px 0 20px;
        }

        .view-stats {
            display: flex;
            gap: 16px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .view-stat {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .view-stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            line-height: 1;
            color: var(--ink);
        }

        .view-stat-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--ink-3);
        }

        /* Confirm delete modal */
        .confirm-icon {
            width: 60px;
            height: 60px;
            background: var(--danger-lt);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }

        .confirm-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            text-align: center;
            margin-bottom: 8px;
        }

        .confirm-sub {
            font-size: 14px;
            color: var(--ink-3);
            text-align: center;
        }

        /* Animations */
        @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
        @keyframes fadeUp    { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: none } }
        @keyframes spin      { to { transform: rotate(360deg) } }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px) }
            to   { opacity: 1; transform: none }
        }

        @media (max-width: 640px) {
            .header-search { display: none; }
            .header-inner { padding: 0 16px; }
            .toolbar, .main { padding-left: 16px; padding-right: 16px; }
            .posts-grid { grid-template-columns: 1fr; }
            .view-stats { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-inner">
        <a href="#" class="logo">
            <div class="logo-mark">B</div>
            <span class="logo-text">The Blog</span>
        </a>

        <div class="header-search">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Search posts by title or author…">
        </div>

        <div class="header-right">
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userNameDisplay"></span>
            </div>
            <button class="btn btn-ghost" onclick="logout()">Sign out</button>
        </div>
    </div>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
    <div class="toolbar-left">
        <h1 class="page-title">All Posts</h1>
        <span class="post-count" id="postCount"></span>
    </div>
    <div class="toolbar-right">
        <select class="sort-select" id="sortSelect" onchange="sortPosts()">
            <option value="recent">Recent first</option>
            <option value="oldest">Oldest first</option>
            <option value="likes">Most liked</option>
            <option value="author">By author</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            New Post
        </button>
    </div>
</div>

<!-- ── MAIN ── -->
<main class="main">
    <div class="posts-grid" id="postsGrid">
        <div class="state-box">
            <div class="spinner"></div>
            <p class="state-sub">Loading posts…</p>
        </div>
    </div>
</main>

<!-- ── TOAST STACK ── -->
<div class="toast-stack" id="toastStack"></div>

<!-- ── CREATE / EDIT MODAL ── -->
<div class="modal-backdrop hidden" id="createModal">
    <div class="modal-box modal-sm">
        <div class="modal-head">
            <h2 id="createModalTitle">New Post</h2>
            <button class="modal-close-btn" onclick="closeCreateModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-error hidden" id="createFormError">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M7 4v3.5M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="createFormErrorText"></span>
            </div>
            <div class="form-group">
                <label class="form-label" for="postTitleInput">Post Title</label>
                <input type="text" class="form-input" id="postTitleInput"
                       placeholder="Write a compelling title…" maxlength="100" required>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeCreateModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="createSubmitBtn" onclick="submitPost()">Save Post</button>
        </div>
    </div>
</div>

<!-- ── VIEW POST MODAL ── -->
<div class="modal-backdrop hidden" id="viewModal">
    <div class="modal-box modal-md">
        <div class="modal-head">
            <h2>Post Details</h2>
            <button class="modal-close-btn" onclick="closeViewModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="view-author-row">
                <div class="view-author-avatar" id="viewAuthorAvatar"></div>
                <div>
                    <div class="view-author-name" id="viewAuthor"></div>
                    <div class="view-author-date" id="viewDate"></div>
                </div>
            </div>
            <div class="view-title-block" id="viewPostTitle"></div>
            <div class="view-stats">
                <div class="view-stat">
                    <span class="view-stat-num" id="viewLikes">0</span>
                    <span class="view-stat-label">👍 Likes</span>
                </div>
                <div class="view-stat">
                    <span class="view-stat-num" id="viewDislikes">0</span>
                    <span class="view-stat-label">👎 Dislikes</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-success" onclick="likePost()">👍 Like</button>
            <button class="btn btn-ghost" onclick="dislikePost()">👎 Dislike</button>
            <div class="spacer"></div>
            <button class="btn btn-ghost" id="editBtn" style="display:none;" onclick="editPost()">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M9.5 1.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Edit
            </button>
            <button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deletePost()">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M1.5 3.5h10M4.5 3.5V2.5a1 1 0 011-1h2a1 1 0 011 1v1M5.5 6v4M7.5 6v4M2.5 3.5l.7 7a1 1 0 001 .9h4.6a1 1 0 001-.9l.7-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Delete
            </button>
            <button class="btn btn-ghost" onclick="closeViewModal()">Close</button>
        </div>
    </div>
</div>

<!-- ── CONFIRM DELETE MODAL ── -->
<div class="modal-backdrop hidden" id="confirmModal">
    <div class="modal-box modal-sm">
        <div class="modal-body" style="padding: 32px 28px;">
            <div class="confirm-icon">🗑️</div>
            <div class="confirm-title">Delete this post?</div>
            <p class="confirm-sub">This action cannot be undone.</p>
        </div>
        <div class="modal-footer" style="justify-content:center;">
            <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancel</button>
            <button class="btn btn-danger" id="confirmDeleteBtn">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M1.5 3.5h10M4.5 3.5V2.5a1 1 0 011-1h2a1 1 0 011 1v1M5.5 6v4M7.5 6v4M2.5 3.5l.7 7a1 1 0 001 .9h4.6a1 1 0 001-.9l.7-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Yes, Delete
            </button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>

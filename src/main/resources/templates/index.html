<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts - Blog</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">📝 Blog Posts</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openCreateModal()">✏️ Create New Post</button>
                    <button class="btn btn-logout" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </header>

        <!-- Filter Section -->
        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="🔍 Search posts by title or author..." class="search-input">
            <select id="sortSelect" class="sort-select" onchange="sortPosts()">
                <option value="recent">Recent First</option>
                <option value="oldest">Oldest First</option>
                <option value="likes">Most Liked</option>
                <option value="author">By Author</option>
            </select>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner hidden"></div>

        <!-- Alert/Notification Container -->
        <div id="alertContainer" class="alert-container"></div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Posts Container -->
        <div id="postsContainer" class="posts-grid">
            <!-- Posts will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <h2>📭 No posts found</h2>
            <p>Create your first post to get started!</p>
            <button class="btn btn-primary" onclick="openCreateModal()">Create Post</button>
        </div>
    </div>

    <!-- Create/Edit Post Modal -->
    <div id="postModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <form id="postForm" class="post-form">
                <div id="formError" class="form-error hidden"></div>
                <div class="form-group">
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required maxlength="20" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="title">Post Title:</label>
                    <input type="text" id="title" name="title" required maxlength="100" placeholder="Enter your post title">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Post</button>
                    <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Post Modal -->
    <div id="viewModal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="viewTitle"></h2>
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="view-post">
                    <p class="view-author">By <strong id="viewAuthor"></strong></p>
                    <p class="view-date" id="viewDate"></p>
                    <div class="view-stats">
                        <span class="stat">👍 <span id="viewLikes">0</span> Likes</span>
                        <span class="stat">👎 <span id="viewDislikes">0</span> Dislikes</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="likePost()">👍 Like</button>
                <button class="btn btn-danger" onclick="dislikePost()">👎 Dislike</button>
                <button class="btn btn-warning" id="editBtn" onclick="editPost()" style="display:none;">✏️ Edit</button>
                <button class="btn btn-danger" id="deleteBtn" onclick="deletePost()" style="display:none;">🗑️ Delete</button>
                <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

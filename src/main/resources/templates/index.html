<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Posts</title>
    <meta name="current-user" th:content="${username}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a18;
            --ink-soft: #4a4a44;
            --ink-faint: #9a9a90;
            --paper: #f5f3ee;
            --paper-dark: #eceae3;
            --accent: #c8502a;
            --accent-hover: #a83e1e;
            --success: #2d7d52;
            --border: rgba(26,26,24,0.10);
            --border-strong: rgba(26,26,24,0.22);
            --white: #ffffff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245,243,238,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-strong);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            color: var(--paper);
        }

        .logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--ink);
        }

        .header-center {
            flex: 1;
            max-width: 380px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--white);
            border: 1px solid var(--border-strong);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--ink); }
        .search-input::placeholder { color: var(--ink-faint); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px 6px 6px;
            background: var(--white);
            border: 1px solid var(--border-strong);
            font-size: 13px;
            color: var(--ink-soft);
        }

        .user-avatar {
            width: 26px;
            height: 26px;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--paper);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.18s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--ink);
            color: var(--paper);
        }
        .btn-primary:hover { background: #2e2e2a; }

        .btn-ghost {
            background: transparent;
            color: var(--ink-soft);
            border: 1px solid var(--border-strong);
        }
        .btn-ghost:hover { background: var(--paper-dark); color: var(--ink); }

        .btn-danger-ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid transparent;
        }
        .btn-danger-ghost:hover { background: #fdf2f0; border-color: #f0c4bb; }

        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover { background: #246342; }

        .btn:active { transform: scale(0.98); }

        /* ── TOOLBAR ── */
        .toolbar {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 32px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .toolbar-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            line-height: 1;
        }

        .post-count {
            font-size: 13px;
            color: var(--ink-faint);
        }

        .sort-select {
            padding: 7px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink-soft);
            background: var(--white);
            border: 1px solid var(--border-strong);
            outline: none;
            cursor: pointer;
        }

        /* ── MAIN ── */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 32px 80px;
            position: relative;
            z-index: 1;
        }

        /* ── POSTS GRID ── */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1px;
            background: var(--border-strong);
            border: 1px solid var(--border-strong);
            margin-top: 20px;
        }

        .post-card {
            background: var(--white);
            padding: 28px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 160px;
        }

        .post-card:hover { background: var(--paper); }

        .post-card-header { flex: 1; }

        .post-title {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            line-height: 1.35;
            color: var(--ink);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--ink-faint);
        }

        .post-author-dot {
            width: 20px;
            height: 20px;
            background: var(--paper-dark);
            border: 1px solid var(--border-strong);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 500;
            color: var(--ink-soft);
            flex-shrink: 0;
        }

        .meta-sep { color: var(--border-strong); }

        .post-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .post-reactions {
            display: flex;
            gap: 16px;
        }

        .reaction {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--ink-faint);
        }

        .reaction-icon {
            font-size: 13px;
        }

        .post-arrow {
            color: var(--ink-faint);
            font-size: 16px;
            transition: transform 0.2s;
        }

        .post-card:hover .post-arrow { transform: translateX(4px); }

        /* ── EMPTY / ERROR / LOADING ── */
        .state-box {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 32px;
            text-align: center;
            background: var(--white);
        }

        .state-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .state-title {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .state-subtitle {
            font-size: 14px;
            color: var(--ink-faint);
            margin-bottom: 24px;
        }

        .spinner-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border-strong);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }

        /* ── ALERT TOASTS ── */
        .alert-stack {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 1000;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 18px;
            min-width: 240px;
            max-width: 360px;
            font-size: 13px;
            background: var(--white);
            border: 1px solid var(--border-strong);
            border-left: 3px solid var(--ink);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: slideInRight 0.25s ease;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error   { border-left-color: var(--accent); }

        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-faint);
            font-size: 16px;
            line-height: 1;
            padding: 0 0 0 8px;
        }

        /* ── MODAL ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(26,26,24,0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.2s ease;
        }

        .modal-backdrop.hidden { display: none; }

        .modal-box {
            background: var(--white);
            width: 100%;
            animation: fadeUp 0.25s ease;
        }

        .modal-box.modal-sm { max-width: 440px; }
        .modal-box.modal-md { max-width: 560px; }

        .modal-head {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-head h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            font-weight: 400;
        }

        .modal-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-faint);
            font-size: 22px;
            line-height: 1;
            padding: 2px 4px;
            transition: color 0.15s;
        }
        .modal-close-btn:hover { color: var(--ink); }

        .modal-body {
            padding: 28px;
        }

        .modal-footer {
            padding: 16px 28px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal-footer .spacer { margin-left: auto; }

        /* Form inside modal */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--ink);
            background: var(--paper);
            border: 1px solid var(--border-strong);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-input:focus {
            border-color: var(--ink);
            background: var(--white);
        }

        .form-error {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #fdf2f0;
            border: 1px solid #f0c4bb;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .form-error.hidden { display: none; }

        /* View post detail */
        .view-detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--ink-soft);
            margin-bottom: 10px;
        }

        .view-stats-row {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .view-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .view-stat-num {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            line-height: 1;
        }

        .view-stat-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        /* Loading btn state */
        .btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Animations */
        @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
        @keyframes fadeUp    { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: none } }
        @keyframes spin      { to { transform: rotate(360deg) } }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px) }
            to   { opacity: 1; transform: none }
        }

        @media (max-width: 600px) {
            .header-inner { padding: 0 16px; }
            .header-center { display: none; }
            .main, .toolbar { padding-left: 16px; padding-right: 16px; }
            .posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-inner">
        <a href="#" class="logo">
            <div class="logo-mark">B</div>
            <span class="logo-text">The Blog</span>
        </a>

        <div class="header-center">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10 10l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Search posts by title or author…">
        </div>

        <div class="header-right">
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userNameDisplay"></span>
            </div>
            <button class="btn btn-ghost" onclick="logout()">Sign out</button>
        </div>
    </div>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
    <div class="toolbar-left">
        <h1 class="page-title">Posts</h1>
        <span class="post-count" id="postCount"></span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
        <select class="sort-select" id="sortSelect" onchange="sortPosts()">
            <option value="recent">Recent first</option>
            <option value="oldest">Oldest first</option>
            <option value="likes">Most liked</option>
            <option value="author">By author</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            New Post
        </button>
    </div>
</div>

<!-- ── MAIN ── -->
<main class="main">
    <div class="posts-grid" id="postsGrid">
        <div class="state-box">
            <div class="spinner-ring"></div>
            <p style="font-size:13px;color:var(--ink-faint);">Loading posts…</p>
        </div>
    </div>
</main>

<!-- ── ALERT TOASTS ── -->
<div class="alert-stack" id="alertStack"></div>

<!-- ── CREATE / EDIT MODAL ── -->
<div class="modal-backdrop hidden" id="createModal">
    <div class="modal-box modal-sm">
        <div class="modal-head">
            <h2 id="createModalTitle">New post</h2>
            <button class="modal-close-btn" onclick="closeCreateModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-error hidden" id="createFormError">
                <span id="createFormErrorText"></span>
            </div>
            <div class="form-group">
                <label class="form-label" for="postTitleInput">Post title</label>
                <input type="text" class="form-input" id="postTitleInput"
                       placeholder="Enter a compelling title…" maxlength="100" required>
            </div>
            <!-- Author is resolved server-side from Spring Security session -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeCreateModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="createSubmitBtn" onclick="submitPost()">Save post</button>
        </div>
    </div>
</div>

<!-- ── VIEW POST MODAL ── -->
<div class="modal-backdrop hidden" id="viewModal">
    <div class="modal-box modal-md">
        <div class="modal-head">
            <h2 id="viewPostTitle" style="font-size:18px;max-width:440px;line-height:1.3;"></h2>
            <button class="modal-close-btn" onclick="closeViewModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="view-detail-row">
                <span id="viewAuthorDot" style="width:22px;height:22px;background:var(--paper-dark);border:1px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--ink-soft);flex-shrink:0;"></span>
                <strong id="viewAuthor"></strong>
                <span style="color:var(--border-strong)">·</span>
                <span id="viewDate" style="color:var(--ink-faint);"></span>
            </div>
            <div class="view-stats-row">
                <div class="view-stat">
                    <span class="view-stat-num" id="viewLikes">0</span>
                    <span class="view-stat-label">Likes</span>
                </div>
                <div class="view-stat">
                    <span class="view-stat-num" id="viewDislikes">0</span>
                    <span class="view-stat-label">Dislikes</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-success" onclick="likePost()">👍 Like</button>
            <button class="btn btn-ghost" onclick="dislikePost()">👎 Dislike</button>
            <div class="spacer"></div>
            <button class="btn btn-ghost" id="editBtn" style="display:none;" onclick="editPost()">Edit</button>
            <button class="btn btn-danger-ghost" id="deleteBtn" style="display:none;" onclick="deletePost()">Delete</button>
            <button class="btn btn-ghost" onclick="closeViewModal()">Close</button>
        </div>
    </div>
</div>

<script>
    const API = '/api';
    let allPosts = [];
    let currentViewingId = null;
    let isEditMode = false;
    let editingId = null;
    let currentUser = null;   // set from Spring Security via /api/me or meta tag

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentUser();
        loadPosts();

        document.getElementById('searchInput').addEventListener('input', e => {
            filterPosts(e.target.value);
        });

        // Close modals on backdrop click
        document.getElementById('createModal').addEventListener('click', e => {
            if (e.target.id === 'createModal') closeCreateModal();
        });
        document.getElementById('viewModal').addEventListener('click', e => {
            if (e.target.id === 'viewModal') closeViewModal();
        });

        // Submit on Enter in title field
        document.getElementById('postTitleInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitPost();
        });
    });

    // ── CURRENT USER ──
    // Fetch the logged-in user's info from backend (email resolved via Spring Security)
    function loadCurrentUser() {
        function loadCurrentUser() {
            const meta = document.querySelector('meta[name="current-user"]');
            if (meta && meta.content) {
                currentUser = { name: meta.content, email: meta.content };
                document.getElementById('userNameDisplay').textContent = meta.content;
                document.getElementById('userAvatar').textContent = meta.content.charAt(0).toUpperCase();
            } else {
                document.getElementById('userNameDisplay').textContent = 'Sign in';
            }
        }
    }

    // ── POSTS ──
    function loadPosts() {
        fetch(`${API}/posts`, {
            headers: { 'Content-Type': 'application/json', 'Authorization': getAuthHeader() }
        })
            .then(r => handleResponse(r))
            .then(data => {
                allPosts = data.posts || data || [];
                renderPosts(allPosts);
            })
            .catch(err => {
                renderError(err.message || 'Failed to load posts.');
            });
    }

    function renderPosts(posts) {
        const grid = document.getElementById('postsGrid');

        if (!posts || posts.length === 0) {
            grid.innerHTML = `
                    <div class="state-box">
                        <div class="state-icon">📭</div>
                        <div class="state-title">No posts yet</div>
                        <p class="state-subtitle">Be the first to write something.</p>
                        <button class="btn btn-primary" onclick="openCreateModal()">
                            Write a post
                        </button>
                    </div>`;
            document.getElementById('postCount').textContent = '';
            return;
        }

        document.getElementById('postCount').textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

        grid.innerHTML = posts.map(post => {
            const initials = (post.author || '?').charAt(0).toUpperCase();
            return `
                <div class="post-card" onclick="viewPost(${post.id})">
                    <div class="post-card-header">
                        <h3 class="post-title">${escHtml(post.title)}</h3>
                        <div class="post-meta">
                            <span class="post-author-dot">${initials}</span>
                            <span>${escHtml(post.author)}</span>
                            <span class="meta-sep">·</span>
                            <span>${fmtDate(post.createdDate)}</span>
                        </div>
                    </div>
                    <div class="post-card-footer">
                        <div class="post-reactions">
                            <span class="reaction"><span class="reaction-icon">👍</span>${post.numberOfLikes}</span>
                            <span class="reaction"><span class="reaction-icon">👎</span>${post.numberOfDislikes}</span>
                        </div>
                        <span class="post-arrow">→</span>
                    </div>
                </div>`;
        }).join('');
    }

    function renderError(msg) {
        document.getElementById('postsGrid').innerHTML = `
                <div class="state-box">
                    <div class="state-icon">⚠️</div>
                    <div class="state-title">Something went wrong</div>
                    <p class="state-subtitle">${escHtml(msg)}</p>
                    <button class="btn btn-primary" onclick="loadPosts()">Try again</button>
                </div>`;
    }

    function filterPosts(term) {
        if (!term.trim()) { renderPosts(allPosts); return; }
        const t = term.toLowerCase();
        renderPosts(allPosts.filter(p =>
            p.title.toLowerCase().includes(t) || (p.author || '').toLowerCase().includes(t)
        ));
    }

    function sortPosts() {
        const val = document.getElementById('sortSelect').value;
        const sorted = [...allPosts];
        if (val === 'recent')  sorted.sort((a,b) => new Date(b.createDate) - new Date(a.createDate));
        if (val === 'oldest')  sorted.sort((a,b) => new Date(a.createDate) - new Date(b.createDate));
        if (val === 'likes')   sorted.sort((a,b) => b.numberOfLikes - a.numberOfLikes);
        if (val === 'author')  sorted.sort((a,b) => (a.author||'').localeCompare(b.author||''));
        renderPosts(sorted);
    }

    // ── VIEW POST ──
    function viewPost(id) {
        const post = allPosts.find(p => p.id === id);
        if (!post) return;
        currentViewingId = id;

        document.getElementById('viewPostTitle').textContent = post.title;
        document.getElementById('viewAuthor').textContent = post.author || 'Unknown';
        document.getElementById('viewAuthorDot').textContent = (post.author || '?').charAt(0).toUpperCase();
        document.getElementById('viewDate').textContent = fmtDate(post.createDate);
        document.getElementById('viewLikes').textContent = post.numberOfLikes;
        document.getElementById('viewDislikes').textContent = post.numberOfDislikes;

        // Show edit/delete only for post owner
        const isOwn = currentUser && (currentUser.name === post.author || currentUser.email === post.author);
        document.getElementById('editBtn').style.display = isOwn ? 'inline-flex' : 'none';
        document.getElementById('deleteBtn').style.display = isOwn ? 'inline-flex' : 'none';

        document.getElementById('viewModal').classList.remove('hidden');
    }

    function closeViewModal() {
        document.getElementById('viewModal').classList.add('hidden');
        currentViewingId = null;
    }

    // ── LIKE / DISLIKE ──
    function likePost() {
        const post = allPosts.find(p => p.id === currentViewingId);
        if (!post) return;
        updatePostReactions(post, post.numberOfLikes + 1, post.numberOfDislikes);
    }

    function dislikePost() {
        const post = allPosts.find(p => p.id === currentViewingId);
        if (!post) return;
        updatePostReactions(post, post.numberOfLikes, post.numberOfDislikes + 1);
    }

    function updatePostReactions(post, likes, dislikes) {
        fetch(`${API}/posts/${post.id}`, {
            method: 'PUT',
            headers: { 'Authorization': getAuthHeader(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: post.title, numberOfLikes: likes, numberOfDislikes: dislikes })
        })
            .then(r => handleResponse(r))
            .then(() => {
                post.numberOfLikes = likes;
                post.numberOfDislikes = dislikes;
                document.getElementById('viewLikes').textContent = likes;
                document.getElementById('viewDislikes').textContent = dislikes;
                showToast('Reaction saved', 'success');
            })
            .catch(err => showToast(err.message, 'error'));
    }

    // ── CREATE / EDIT ──
    function openCreateModal() {
        isEditMode = false;
        editingId = null;
        document.getElementById('createModalTitle').textContent = 'New post';
        document.getElementById('postTitleInput').value = '';
        hideFormError();
        document.getElementById('createModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('postTitleInput').focus(), 50);
    }

    function editPost() {
        const post = allPosts.find(p => p.id === currentViewingId);
        if (!post) return;
        isEditMode = true;
        editingId = currentViewingId;

        document.getElementById('createModalTitle').textContent = 'Edit post';
        document.getElementById('postTitleInput').value = post.title;
        hideFormError();

        closeViewModal();
        document.getElementById('createModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('postTitleInput').focus(), 50);
    }

    function closeCreateModal() {
        document.getElementById('createModal').classList.add('hidden');
        isEditMode = false;
        editingId = null;
        hideFormError();
    }

    function submitPost() {
        const title = document.getElementById('postTitleInput').value.trim();
        const btn = document.getElementById('createSubmitBtn');

        if (!title) { showFormError('Please enter a post title.'); return; }
        if (title.length > 100) { showFormError('Title must be under 100 characters.'); return; }

        hideFormError();
        btn.classList.add('loading');
        btn.textContent = 'Saving…';

        if (isEditMode) {
            const post = allPosts.find(p => p.id === editingId);
            fetch(`${API}/posts/${editingId}`, {
                method: 'PUT',
                headers: { 'Authorization': getAuthHeader(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, numberOfLikes: post.numberOfLikes, numberOfDislikes: post.numberOfDislikes })
            })
                .then(r => handleResponse(r))
                .then(() => {
                    closeCreateModal();
                    loadPosts();
                    showToast('Post updated', 'success');
                })
                .catch(err => showFormError(err.message))
                .finally(() => { btn.classList.remove('loading'); btn.textContent = 'Save post'; });
        } else {
            // Only send title — author resolved server-side from Spring Security context
            fetch(`${API}/posts`, {
                method: 'POST',
                headers: { 'Authorization': getAuthHeader(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            })
                .then(r => handleResponse(r))
                .then(() => {
                    closeCreateModal();
                    loadPosts();
                    showToast('Post created!', 'success');
                })
                .catch(err => showFormError(err.message))
                .finally(() => { btn.classList.remove('loading'); btn.textContent = 'Save post'; });
        }
    }

    // ── DELETE ──
    function deletePost() {
        if (!currentViewingId) return;
        if (!confirm('Delete this post? This cannot be undone.')) return;

        fetch(`${API}/posts/${currentViewingId}`, {
            method: 'DELETE',
            headers: { 'Authorization': getAuthHeader() }
        })
            .then(r => { if (!r.ok) throw new Error('Delete failed'); })
            .then(() => {
                allPosts = allPosts.filter(p => p.id !== currentViewingId);
                closeViewModal();
                renderPosts(allPosts);
                showToast('Post deleted', 'success');
            })
            .catch(err => showToast(err.message, 'error'));
    }

    // ── LOGOUT ──
    function logout() {
        if (!confirm('Sign out?')) return;
        // Spring Security logout via POST to /logout
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/logout';

        // CSRF token — read from meta tag if set by Thymeleaf:
        // <meta name="_csrf" th:content="${_csrf.token}">
        // <meta name="_csrf_header" th:content="${_csrf.headerName}">
        const csrfMeta = document.querySelector('meta[name="_csrf"]');
        if (csrfMeta) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = '_csrf';
            input.value = csrfMeta.content;
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
    }

    // ── HELPERS ──
    function handleResponse(r) {
        if (!r.ok) {
            return r.json().then(d => {
                const err = new Error(d.message || `Error ${r.status}`);
                err.status = r.status;
                throw err;
            }).catch(e => { if (e.status) throw e; throw new Error(`Error ${r.status}`); });
        }
        const ct = r.headers.get('content-type') || '';
        return ct.includes('application/json') ? r.json() : r.text();
    }

    function getAuthHeader() {
        const t = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
        return t ? `Bearer ${t}` : '';
    }

    function showFormError(msg) {
        document.getElementById('createFormErrorText').textContent = msg;
        document.getElementById('createFormError').classList.remove('hidden');
    }

    function hideFormError() {
        document.getElementById('createFormError').classList.add('hidden');
    }

    function showToast(msg, type = 'info') {
        const stack = document.getElementById('alertStack');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${escHtml(msg)}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
        stack.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) toast.remove(); }, 4500);
    }

    function fmtDate(d) {
        if (!d) return '';
        try { return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
        catch { return d; }
    }

    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Posts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/landing.css}">
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-inner">
        <a href="#" class="logo">
            <div class="logo-mark">B</div>
            <span class="logo-text">The Blog</span>
        </a>

        <div class="header-center">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10 10l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Search posts by title or author…">
        </div>

        <div class="header-right">
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userNameDisplay">Loading…</span>
            </div>
            <button class="btn btn-ghost" onclick="logout()">Sign out</button>
        </div>
    </div>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
    <div class="toolbar-left">
        <h1 class="page-title">Posts</h1>
        <span class="post-count" id="postCount"></span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
        <select class="sort-select" id="sortSelect" onchange="sortPosts()">
            <option value="recent">Recent first</option>
            <option value="oldest">Oldest first</option>
            <option value="likes">Most liked</option>
            <option value="author">By author</option>
        </select>
        <button class="btn btn-primary" onclick="openCreateModal()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            New Post
        </button>
    </div>
</div>

<!-- ── MAIN ── -->
<main class="main">
    <div class="posts-grid" id="postsGrid">
        <div class="state-box">
            <div class="spinner-ring"></div>
            <p style="font-size:13px;color:var(--ink-faint);">Loading posts…</p>
        </div>
    </div>
</main>

<!-- ── ALERT TOASTS ── -->
<div class="alert-stack" id="alertStack"></div>

<!-- ── CREATE / EDIT MODAL ── -->
<div class="modal-backdrop hidden" id="createModal">
    <div class="modal-box modal-sm">
        <div class="modal-head">
            <h2 id="createModalTitle">New post</h2>
            <button class="modal-close-btn" onclick="closeCreateModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-error hidden" id="createFormError">
                <span id="createFormErrorText"></span>
            </div>
            <div class="form-group">
                <label class="form-label" for="postTitleInput">Post title</label>
                <input type="text" class="form-input" id="postTitleInput"
                       placeholder="Enter a compelling title…" maxlength="100" required>
            </div>
            <!-- Author is resolved server-side from Spring Security session -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeCreateModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="createSubmitBtn" onclick="submitPost()">Save post</button>
        </div>
    </div>
</div>

<!-- ── VIEW POST MODAL ── -->
<div class="modal-backdrop hidden" id="viewModal">
    <div class="modal-box modal-md">
        <div class="modal-head">
            <h2 id="viewPostTitle" style="font-size:18px;max-width:440px;line-height:1.3;"></h2>
            <button class="modal-close-btn" onclick="closeViewModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="view-detail-row">
                <span id="viewAuthorDot" style="width:22px;height:22px;background:var(--paper-dark);border:1px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--ink-soft);flex-shrink:0;"></span>
                <strong id="viewAuthor"></strong>
                <span style="color:var(--border-strong)">·</span>
                <span id="viewDate" style="color:var(--ink-faint);"></span>
            </div>
            <div class="view-stats-row">
                <div class="view-stat">
                    <span class="view-stat-num" id="viewLikes">0</span>
                    <span class="view-stat-label">Likes</span>
                </div>
                <div class="view-stat">
                    <span class="view-stat-num" id="viewDislikes">0</span>
                    <span class="view-stat-label">Dislikes</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-success" onclick="likePost()">👍 Like</button>
            <button class="btn btn-ghost" onclick="dislikePost()">👎 Dislike</button>
            <div class="spacer"></div>
            <button class="btn btn-ghost" id="editBtn" style="display:none;" onclick="editPost()">Edit</button>
            <button class="btn btn-danger-ghost" id="deleteBtn" style="display:none;" onclick="deletePost()">Delete</button>
            <button class="btn btn-ghost" onclick="closeVaiewModal()">Close</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>

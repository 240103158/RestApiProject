<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a18;
            --ink-soft: #4a4a44;
            --ink-faint: #9a9a90;
            --paper: #f5f3ee;
            --paper-dark: #eceae3;
            --accent: #c8502a;
            --accent-hover: #a83e1e;
            --border: rgba(26,26,24,0.12);
            --border-strong: rgba(26,26,24,0.25);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Big decorative number */
        body::after {
            content: 'B';
            position: fixed;
            font-family: 'DM Serif Display', serif;
            font-size: 40vw;
            color: rgba(26,26,24,0.03);
            right: -8vw;
            bottom: -10vw;
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeDown 0.5s ease both;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: var(--ink);
            color: var(--paper);
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--ink-faint);
            margin-top: 4px;
            font-weight: 300;
        }

        /* Card */
        .card {
            background: #fff;
            border: 1px solid var(--border-strong);
            padding: 40px;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-faint);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: -1.5px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--ink);
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }

        .tab.active {
            color: var(--ink);
        }

        .tab.active::after {
            transform: scaleX(1);
        }

        /* Forms */
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--ink);
            background: var(--paper);
            border: 1px solid var(--border-strong);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--ink);
            background: #fff;
        }

        input::placeholder {
            color: var(--ink-faint);
        }

        /* Error state */
        .error-banner {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            background: #fdf2f0;
            border: 1px solid #f0c4bb;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--accent);
            animation: fadeIn 0.2s ease;
        }

        .error-banner .err-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            margin-top: 1px;
        }

        .error-banner.hidden { display: none; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--paper);
            background: var(--ink);
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover { background: #2e2e2a; }
        .btn-submit:active { transform: scale(0.99); }

        .btn-submit.loading {
            color: transparent;
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--ink-faint);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Password strength */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .strength-seg {
            flex: 1;
            height: 2px;
            background: var(--border);
            transition: background 0.3s;
        }
        .strength-seg.weak   { background: #e05c40; }
        .strength-seg.medium { background: #e09a40; }
        .strength-seg.strong { background: #40a870; }

        .strength-label {
            font-size: 11px;
            color: var(--ink-faint);
            margin-top: 6px;
        }

        /* Footer */
        .page-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--ink-faint);
            animation: fadeUp 0.5s ease 0.2s both;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="brand">
        <div class="brand-mark">B</div>
        <div class="brand-name">The Blog</div>
        <div class="brand-tagline">Write. Share. Connect.</div>
    </div>

    <div class="card">
        <!-- Hidden input rendered by Thymeleaf so JS can read isAuthenticatedFailed -->
        <input type="hidden" id="authFailedFlag" th:value="${isAuthenticatedFailed != null ? isAuthenticatedFailed : false}"/>
        <input type="hidden" id="registerModeFlag" th:value="${registerMode}" />

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginPanel" class="form-panel active">
            <div id="loginError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="loginErrorText">Invalid email or password.</span>
            </div>

            <form id="loginForm" th:action="@{/api/login}" method="post">
<!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <input type="email" id="loginEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerPanel" class="form-panel">
            <div id="registerError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="registerErrorText">Something went wrong. Please try again.</span>
            </div>

            <form id="registerForm" th:action="@{/api/registration}" method="post">
<!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <div class="form-group">
                    <label for="regName">Full name</label>
                    <input type="text" id="regName" name="name"
                           placeholder="Jane Smith" required maxlength="50" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email address</label>
                    <input type="email" id="regEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password"
                           placeholder="••••••••" required autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                    <div class="strength-bar">
                        <div class="strength-seg" id="seg1"></div>
                        <div class="strength-seg" id="seg2"></div>
                        <div class="strength-seg" id="seg3"></div>
                        <div class="strength-seg" id="seg4"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">Create Account</button>
            </form>
        </div>
    </div>

    <div class="page-footer">
        By continuing, you agree to our Terms of Service.
    </div>
</div>

<script>
    // Switch tabs
    function switchTab(tab) {
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.form-panel');

        tabs.forEach((t, i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });

        document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
        document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    // Show error from Thymeleaf model attribute (set by backend when login fails)
    window.addEventListener('DOMContentLoaded', () => {
        // Backend sets isAuthenticatedFailed=true in model on bad login
        // Thymeleaf renders it into a hidden flag we can read
        const authFailed = document.getElementById('authFailedFlag');
        if (authFailed && authFailed.value === 'true') {
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginErrorText').textContent = 'Invalid email or password. Please try again.';
        }

        // Auto-switch to register tab when URL is /api/registration
        // Both /api/login and /api/registration return this same template
        if (window.location.pathname.includes('registration')) {
            switchTab('register');
        }

        // Add loading state on form submit
        document.getElementById('loginForm').addEventListener('submit', () => {
            document.getElementById('loginBtn').classList.add('loading');
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;

            if (!name || !email || !pass) {
                e.preventDefault();
                showRegisterError('Please fill in all fields.');
                return;
            }
            if (pass.length < 6) {
                e.preventDefault();
                showRegisterError('Password must be at least 6 characters.');
                return;
            }
            document.getElementById('registerBtn').classList.add('loading');
        });
    });

    function showRegisterError(msg) {
        const banner = document.getElementById('registerError');
        document.getElementById('registerErrorText').textContent = msg;
        banner.classList.remove('hidden');
    }

    // Password strength
    function checkStrength(val) {
        const segs = [document.getElementById('seg1'), document.getElementById('seg2'),
            document.getElementById('seg3'), document.getElementById('seg4')];
        const label = document.getElementById('strengthLabel');

        segs.forEach(s => s.className = 'strength-seg');

        if (!val) { label.textContent = ''; return; }

        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
        const labels = { weak: 'Weak', medium: 'Fair', strong: 'Strong' };

        for (let i = 0; i < score; i++) segs[i].classList.add(cls);
        label.textContent = labels[cls];
        label.style.color = cls === 'weak' ? '#e05c40' : cls === 'medium' ? '#e09a40' : '#40a870';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const authFailed = document.getElementById('authFailedFlag');
        if (authFailed && authFailed.value === 'true') {
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginErrorText').textContent = 'Invalid email or password. Please try again.';
        }

        const registerMode = document.getElementById('registerModeFlag');
        if (registerMode && registerMode.value === 'true') {
            switchTab('register');
        }

        document.getElementById('loginForm').addEventListener('submit', () => {
            document.getElementById('loginBtn').classList.add('loading');
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;

            if (!name || !email || !pass) {
                e.preventDefault();
                showRegisterError('Please fill in all fields.');
                return;
            }
            if (pass.length < 6) {
                e.preventDefault();
                showRegisterError('Password must be at least 6 characters.');
                return;
            }
            document.getElementById('registerBtn').classList.add('loading');
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f1f5f9;
            --surface:   #ffffff;
            --border:    #e2e8f0;
            --border-2:  #cbd5e1;
            --ink:       #0f172a;
            --ink-2:     #475569;
            --ink-3:     #94a3b8;
            --accent:    #6366f1;
            --accent-dk: #4f46e5;
            --accent-lt: #eef2ff;
            --danger:    #ef4444;
            --danger-lt: #fef2f2;
            --success:   #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,.12) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,.08) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            pointer-events: none;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeDown .5s ease both;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
            border-radius: 14px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #fff;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(99,102,241,.35);
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--ink);
            display: block;
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--ink-3);
            margin-top: 4px;
            font-weight: 400;
            display: block;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 8px 40px rgba(15,23,42,.08), 0 2px 8px rgba(15,23,42,.04);
            animation: fadeUp .5s ease .1s both;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 9px 0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-3);
            background: none;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            transition: all .2s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--ink);
            box-shadow: 0 1px 4px rgba(15,23,42,.08);
        }

        /* Forms */
        .form-panel { display: none; }
        .form-panel.active {
            display: block;
            animation: fadeIn .25s ease;
        }

        .form-group { margin-bottom: 18px; }
        .form-group:last-of-type { margin-bottom: 0; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--ink-2);
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,.15);
            background: var(--surface);
        }

        input::placeholder { color: var(--ink-3); }

        /* Error banner */
        .error-banner {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 11px 14px;
            background: var(--danger-lt);
            border: 1.5px solid #fecaca;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--danger);
            animation: fadeIn .2s ease;
        }

        .error-banner.hidden { display: none; }

        .err-icon { flex-shrink: 0; width: 15px; height: 15px; margin-top: 1px; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: filter .2s, transform .1s, box-shadow .2s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(99,102,241,.35);
        }

        .btn-submit:hover { filter: brightness(1.06); box-shadow: 0 4px 16px rgba(99,102,241,.45); }
        .btn-submit:active { transform: scale(0.98); }

        .btn-submit.loading {
            color: transparent;
            pointer-events: none;
            opacity: .8;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 18px; height: 18px;
            margin: -9px 0 0 -9px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0;
            color: var(--ink-3);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Password strength */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-seg {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            transition: background .3s;
        }

        .strength-seg.weak   { background: var(--danger); }
        .strength-seg.medium { background: #f59e0b; }
        .strength-seg.strong { background: var(--success); }

        .strength-label {
            font-size: 11px;
            color: var(--ink-3);
            margin-top: 5px;
            font-weight: 500;
        }

        /* Footer */
        .page-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--ink-3);
            animation: fadeUp .5s ease .2s both;
        }

        /* Animations */
        @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px) } to { opacity: 1; transform: none } }
        @keyframes fadeIn   { from { opacity: 0 } to { opacity: 1 } }
        @keyframes spin     { to { transform: rotate(360deg) } }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="brand">
        <div class="brand-mark">B</div>
        <span class="brand-name">The Blog</span>
        <span class="brand-tagline">Write. Share. Connect.</span>
    </div>

    <div class="card">
        <input type="hidden" id="authFailedFlag" th:value="${isAuthenticatedFailed != null ? isAuthenticatedFailed : false}"/>
        <input type="hidden" id="registerModeFlag" th:value="${registerMode}"/>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab"        onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginPanel" class="form-panel active">
            <div id="loginError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="loginErrorText">Invalid email or password.</span>
            </div>

            <form id="loginForm" th:action="@{/api/login}" method="post">
                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <input type="email" id="loginEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerPanel" class="form-panel">
            <div id="registerError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="registerErrorText">Something went wrong. Please try again.</span>
            </div>

            <form id="registerForm" th:action="@{/api/registration}" method="post">
                <div class="form-group">
                    <label for="regName">Full name</label>
                    <input type="text" id="regName" name="name"
                           placeholder="Jane Smith" required maxlength="50" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email address</label>
                    <input type="email" id="regEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password"
                           placeholder="••••••••" required autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                    <div class="strength-bar">
                        <div class="strength-seg" id="seg1"></div>
                        <div class="strength-seg" id="seg2"></div>
                        <div class="strength-seg" id="seg3"></div>
                        <div class="strength-seg" id="seg4"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">Create Account</button>
            </form>
        </div>
    </div>

    <div class="page-footer">By continuing you agree to our Terms of Service.</div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
        document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const authFailed = document.getElementById('authFailedFlag');
        if (authFailed && authFailed.value === 'true') {
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginErrorText').textContent = 'Invalid email or password. Please try again.';
        }

        const registerMode = document.getElementById('registerModeFlag');
        if (registerMode && registerMode.value === 'true') switchTab('register');

        if (window.location.pathname.includes('registration')) switchTab('register');

        document.getElementById('loginForm').addEventListener('submit', () => {
            document.getElementById('loginBtn').classList.add('loading');
        });

        document.getElementById('registerForm').addEventListener('submit', e => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass  = document.getElementById('regPassword').value;

            if (!name || !email || !pass) {
                e.preventDefault();
                showRegisterError('Please fill in all fields.');
                return;
            }
            if (pass.length < 6) {
                e.preventDefault();
                showRegisterError('Password must be at least 6 characters.');
                return;
            }
            document.getElementById('registerBtn').classList.add('loading');
        });
    });

    function showRegisterError(msg) {
        document.getElementById('registerErrorText').textContent = msg;
        document.getElementById('registerError').classList.remove('hidden');
    }

    function checkStrength(val) {
        const segs  = ['seg1','seg2','seg3','seg4'].map(id => document.getElementById(id));
        const label = document.getElementById('strengthLabel');

        segs.forEach(s => s.className = 'strength-seg');

        if (!val) { label.textContent = ''; return; }

        let score = 0;
        if (val.length >= 8)          score++;
        if (/[A-Z]/.test(val))        score++;
        if (/[0-9]/.test(val))        score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const cls    = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
        const labels = { weak: 'Weak', medium: 'Fair', strong: 'Strong' };
        const colors = { weak: '#ef4444', medium: '#f59e0b', strong: '#22c55e' };

        for (let i = 0; i < score; i++) segs[i].classList.add(cls);
        label.textContent  = labels[cls];
        label.style.color  = colors[cls];
    }
</script>
</body>
</html>

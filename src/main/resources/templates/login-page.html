<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page-wrapper">

    <div class="brand">
        <div class="brand-mark">B</div>
        <div class="brand-name">The Blog</div>
        <div class="brand-tagline">Write. Share. Connect.</div>
    </div>

    <div class="card">
        <!-- Hidden input rendered by Thymeleaf so JS can read isAuthenticatedFailed -->
        <input type="hidden" id="authFailedFlag" th:value="${isAuthenticatedFailed != null ? isAuthenticatedFailed : false}"/>
        <input type="hidden" id="registerModeFlag" th:value="${registerMode}" />

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginPanel" class="form-panel active">
            <div id="loginError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="loginErrorText">Invalid email or password.</span>
            </div>

            <form id="loginForm" th:action="@{/api/login}" method="post">
                <!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <input type="email" id="loginEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerPanel" class="form-panel">
            <div id="registerError" class="error-banner hidden">
                <svg class="err-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="registerErrorText">Something went wrong. Please try again.</span>
            </div>

            <form id="registerForm" th:action="@{/api/registration}" method="post">
                <!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <div class="form-group">
                    <label for="regName">Full name</label>
                    <input type="text" id="regName" name="name"
                           placeholder="Jane Smith" required maxlength="50" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email address</label>
                    <input type="email" id="regEmail" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password"
                           placeholder="••••••••" required autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                    <div class="strength-bar">
                        <div class="strength-seg" id="seg1"></div>
                        <div class="strength-seg" id="seg2"></div>
                        <div class="strength-seg" id="seg3"></div>
                        <div class="strength-seg" id="seg4"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">Create Account</button>
            </form>
        </div>
    </div>

    <div class="page-footer">
        By continuing, you agree to our Terms of Service.
    </div>
</div>

<script>
    // Switch tabs
    function switchTab(tab) {
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.form-panel');

        tabs.forEach((t, i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });

        document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
        document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    // Show error from Thymeleaf model attribute (set by backend when login fails)
    window.addEventListener('DOMContentLoaded', () => {
        // Backend sets isAuthenticatedFailed=true in model on bad login
        // Thymeleaf renders it into a hidden flag we can read
        const authFailed = document.getElementById('authFailedFlag');
        if (authFailed && authFailed.value === 'true') {
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginErrorText').textContent = 'Invalid email or password. Please try again.';
        }

        // Auto-switch to register tab when URL is /api/registration
        // Both /api/login and /api/registration return this same template
        if (window.location.pathname.includes('registration')) {
            switchTab('register');
        }

        // Add loading state on form submit
        document.getElementById('loginForm').addEventListener('submit', () => {
            document.getElementById('loginBtn').classList.add('loading');
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;

            if (!name || !email || !pass) {
                e.preventDefault();
                showRegisterError('Please fill in all fields.');
                return;
            }
            if (pass.length < 6) {
                e.preventDefault();
                showRegisterError('Password must be at least 6 characters.');
                return;
            }
            document.getElementById('registerBtn').classList.add('loading');
        });
    });

    function showRegisterError(msg) {
        const banner = document.getElementById('registerError');
        document.getElementById('registerErrorText').textContent = msg;
        banner.classList.remove('hidden');
    }

    // Password strength
    function checkStrength(val) {
        const segs = [document.getElementById('seg1'), document.getElementById('seg2'),
            document.getElementById('seg3'), document.getElementById('seg4')];
        const label = document.getElementById('strengthLabel');

        segs.forEach(s => s.className = 'strength-seg');

        if (!val) { label.textContent = ''; return; }

        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
        const labels = { weak: 'Weak', medium: 'Fair', strong: 'Strong' };

        for (let i = 0; i < score; i++) segs[i].classList.add(cls);
        label.textContent = labels[cls];
        label.style.color = cls === 'weak' ? '#e05c40' : cls === 'medium' ? '#e09a40' : '#40a870';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const authFailed = document.getElementById('authFailedFlag');
        if (authFailed && authFailed.value === 'true') {
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginErrorText').textContent = 'Invalid email or password. Please try again.';
        }

        const registerMode = document.getElementById('registerModeFlag');
        if (registerMode && registerMode.value === 'true') {
            switchTab('register');
        }

        document.getElementById('loginForm').addEventListener('submit', () => {
            document.getElementById('loginBtn').classList.add('loading');
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;

            if (!name || !email || !pass) {
                e.preventDefault();
                showRegisterError('Please fill in all fields.');
                return;
            }
            if (pass.length < 6) {
                e.preventDefault();
                showRegisterError('Password must be at least 6 characters.');
                return;
            }
            document.getElementById('registerBtn').classList.add('loading');
        });
    });
</script>
</body>
</html>
